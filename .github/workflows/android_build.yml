name: Build
on: [push]
jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Zip Files
        run: zip -r Project.zip .
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: StoriesApp-Files
          path: Project.zip
