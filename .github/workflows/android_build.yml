name: Build Stories App
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Create App Package
        run: |
          mkdir -p output
          zip -r output/StoriesApp_v1.zip src/ README.md
      - name: Upload Result
        uses: actions/upload-artifact@v3
        with:
          name: StoriesApp-Files
          path: output/StoriesApp_v1.zip
